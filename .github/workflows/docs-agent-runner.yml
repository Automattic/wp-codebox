name: Docs Agent Runner (reusable)

'on':
  workflow_call:
    inputs:
      recipe_path:
        description: Repository-relative path to a wp-codebox/docs-agent-runner-recipe/v1 JSON recipe.
        type: string
        default: ""
      recipe_json:
        description: Inline wp-codebox/docs-agent-runner-recipe/v1 JSON recipe. Used when recipe_path is empty.
        type: string
        default: ""
      prompt:
        description: Optional prompt override for this run.
        type: string
        default: ""
      target_repo:
        description: Optional OWNER/REPO target override. Defaults to the caller repository or recipe targetRepository.
        type: string
        default: ""
      run_agent:
        description: When false, record a skipped run without starting the runtime.
        type: boolean
        default: true
      provider:
        description: Model provider id selected by the recipe owner.
        type: string
        default: openai
      model:
        description: Model id selected by the recipe owner.
        type: string
        default: gpt-5.5
      wp_codebox_ref:
        description: Automattic/wp-codebox ref used for the runtime boundary.
        type: string
        default: main
      wordpress_version:
        description: WordPress version used by the contained runtime.
        type: string
        default: "7.0"
      dry_run:
        description: Build and validate the runner request without a live agent call.
        type: boolean
        default: false
    secrets:
      CODEBOX_RUNNER_APP_ID:
        required: false
      CODEBOX_RUNNER_APP_PRIVATE_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      MODEL_PROVIDER_SECRET_1:
        required: false
      MODEL_PROVIDER_SECRET_2:
        required: false
      MODEL_PROVIDER_SECRET_3:
        required: false
      MODEL_PROVIDER_SECRET_4:
        required: false
      MODEL_PROVIDER_SECRET_5:
        required: false
    outputs:
      job_status:
        value: ${{ jobs.run-docs-agent.outputs.job_status }}
      transcript_json:
        value: ${{ jobs.run-docs-agent.outputs.transcript_json }}
      transcript_summary:
        value: ${{ jobs.run-docs-agent.outputs.transcript_summary }}
      engine_data_json:
        value: ${{ jobs.run-docs-agent.outputs.engine_data_json }}
      credential_mode:
        value: ${{ jobs.run-docs-agent.outputs.auth_mode }}

jobs:
  prepare-recipe:
    runs-on: ubuntu-latest
    outputs:
      target_repo: ${{ steps.recipe.outputs.target_repo }}
      prompt: ${{ steps.recipe.outputs.prompt }}
      bundle_repo: ${{ steps.recipe.outputs.bundle_repo }}
      bundle_ref: ${{ steps.recipe.outputs.bundle_ref }}
      bundle_path: ${{ steps.recipe.outputs.bundle_path }}
      bundle_path_in_repo: ${{ steps.recipe.outputs.bundle_path_in_repo }}
      agent_slug: ${{ steps.recipe.outputs.agent_slug }}
      pipeline_slug: ${{ steps.recipe.outputs.pipeline_slug }}
      flow_slug: ${{ steps.recipe.outputs.flow_slug }}
      validation_dependencies: ${{ steps.recipe.outputs.validation_dependencies }}
      context_repositories: ${{ steps.recipe.outputs.context_repositories }}
      verification_commands: ${{ steps.recipe.outputs.verification_commands }}
      drift_checks: ${{ steps.recipe.outputs.drift_checks }}
      writable_paths: ${{ steps.recipe.outputs.writable_paths }}
      workspace_contract_checks: ${{ steps.recipe.outputs.workspace_contract_checks }}
      runner_workspace: ${{ steps.recipe.outputs.runner_workspace }}
      actions_artifact_downloads: ${{ steps.recipe.outputs.actions_artifact_downloads }}
      success_requires_pr: ${{ steps.recipe.outputs.success_requires_pr }}
      success_completion_outcomes: ${{ steps.recipe.outputs.success_completion_outcomes }}
      app_token_repos: ${{ steps.recipe.outputs.app_token_repos }}
      require_app_token: ${{ steps.recipe.outputs.require_app_token }}
      allowed_repos: ${{ steps.recipe.outputs.allowed_repos }}
      max_turns: ${{ steps.recipe.outputs.max_turns }}
      step_budget: ${{ steps.recipe.outputs.step_budget }}
      time_budget_ms: ${{ steps.recipe.outputs.time_budget_ms }}
      expected_artifacts: ${{ steps.recipe.outputs.expected_artifacts }}
      artifact_declarations: ${{ steps.recipe.outputs.artifact_declarations }}
      artifact_export_config: ${{ steps.recipe.outputs.artifact_export_config }}
      transcript_artifact_name: ${{ steps.recipe.outputs.transcript_artifact_name }}
      replay_bundle_artifact_name: ${{ steps.recipe.outputs.replay_bundle_artifact_name }}
      engine_key: ${{ steps.recipe.outputs.engine_key }}
      tool_results_key: ${{ steps.recipe.outputs.tool_results_key }}
      output_mappings: ${{ steps.recipe.outputs.output_mappings }}
      tool_recorders: ${{ steps.recipe.outputs.tool_recorders }}
      rules: ${{ steps.recipe.outputs.rules }}
      general_rules: ${{ steps.recipe.outputs.general_rules }}
      task_rules: ${{ steps.recipe.outputs.task_rules }}
      probes: ${{ steps.recipe.outputs.probes }}
      comment_pr_summary: ${{ steps.recipe.outputs.comment_pr_summary }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Normalize Docs Agent recipe
        id: recipe
        env:
          RECIPE_PATH: ${{ inputs.recipe_path }}
          RECIPE_JSON: ${{ inputs.recipe_json }}
          TARGET_REPO: ${{ inputs.target_repo }}
          PROMPT: ${{ inputs.prompt }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: node scripts/prepare-docs-agent-runner-recipe.mjs

  run-docs-agent:
    needs: prepare-recipe
    uses: Extra-Chill/homeboy-extensions/.github/workflows/datamachine-agent-ci.yml@main
    with:
      bundle_path: ${{ needs.prepare-recipe.outputs.bundle_path }}
      bundle_repo: ${{ needs.prepare-recipe.outputs.bundle_repo }}
      bundle_ref: ${{ needs.prepare-recipe.outputs.bundle_ref }}
      bundle_path_in_repo: ${{ needs.prepare-recipe.outputs.bundle_path_in_repo }}
      agent_slug: ${{ needs.prepare-recipe.outputs.agent_slug }}
      pipeline_slug: ${{ needs.prepare-recipe.outputs.pipeline_slug }}
      flow_slug: ${{ needs.prepare-recipe.outputs.flow_slug }}
      target_repo: ${{ needs.prepare-recipe.outputs.target_repo }}
      prompt: ${{ needs.prepare-recipe.outputs.prompt }}
      run_agent: ${{ inputs.run_agent }}
      provider: ${{ inputs.provider }}
      model: ${{ inputs.model }}
      agent_runtime: wp-codebox
      agent_runtime_ref: ${{ inputs.wp_codebox_ref }}
      runtime_wordpress_version: ${{ inputs.wordpress_version }}
      validation_dependencies: ${{ needs.prepare-recipe.outputs.validation_dependencies }}
      context_repositories: ${{ needs.prepare-recipe.outputs.context_repositories }}
      verification_commands: ${{ needs.prepare-recipe.outputs.verification_commands }}
      drift_checks: ${{ needs.prepare-recipe.outputs.drift_checks }}
      writable_paths: ${{ needs.prepare-recipe.outputs.writable_paths }}
      workspace_contract_checks: ${{ needs.prepare-recipe.outputs.workspace_contract_checks }}
      runner_workspace: ${{ needs.prepare-recipe.outputs.runner_workspace }}
      actions_artifact_downloads: ${{ needs.prepare-recipe.outputs.actions_artifact_downloads }}
      success_requires_pr: ${{ fromJSON(needs.prepare-recipe.outputs.success_requires_pr) }}
      success_completion_outcomes: ${{ needs.prepare-recipe.outputs.success_completion_outcomes }}
      app_token_repos: ${{ needs.prepare-recipe.outputs.app_token_repos }}
      require_homeboy_app_token: ${{ fromJSON(needs.prepare-recipe.outputs.require_app_token) }}
      allowed_repos: ${{ needs.prepare-recipe.outputs.allowed_repos }}
      max_turns: ${{ fromJSON(needs.prepare-recipe.outputs.max_turns) }}
      step_budget: ${{ fromJSON(needs.prepare-recipe.outputs.step_budget) }}
      time_budget_ms: ${{ fromJSON(needs.prepare-recipe.outputs.time_budget_ms) }}
      expected_artifacts: ${{ needs.prepare-recipe.outputs.expected_artifacts }}
      artifact_declarations: ${{ needs.prepare-recipe.outputs.artifact_declarations }}
      artifact_export_config: ${{ needs.prepare-recipe.outputs.artifact_export_config }}
      transcript_artifact_name: ${{ needs.prepare-recipe.outputs.transcript_artifact_name }}
      replay_bundle_artifact_name: ${{ needs.prepare-recipe.outputs.replay_bundle_artifact_name }}
      engine_key: ${{ needs.prepare-recipe.outputs.engine_key }}
      tool_results_key: ${{ needs.prepare-recipe.outputs.tool_results_key }}
      engine_data_outputs: ${{ needs.prepare-recipe.outputs.output_mappings }}
      tool_recorders: ${{ needs.prepare-recipe.outputs.tool_recorders }}
      rules: ${{ needs.prepare-recipe.outputs.rules }}
      general_rules: ${{ needs.prepare-recipe.outputs.general_rules }}
      task_rules: ${{ needs.prepare-recipe.outputs.task_rules }}
      probes: ${{ needs.prepare-recipe.outputs.probes }}
      comment_pr_summary: ${{ fromJSON(needs.prepare-recipe.outputs.comment_pr_summary) }}
      dry_run: ${{ inputs.dry_run }}
    secrets:
      HOMEBOY_APP_ID: ${{ secrets.CODEBOX_RUNNER_APP_ID }}
      HOMEBOY_APP_PRIVATE_KEY: ${{ secrets.CODEBOX_RUNNER_APP_PRIVATE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PROVIDER_SECRET_1: ${{ secrets.MODEL_PROVIDER_SECRET_1 }}
      PROVIDER_SECRET_2: ${{ secrets.MODEL_PROVIDER_SECRET_2 }}
      PROVIDER_SECRET_3: ${{ secrets.MODEL_PROVIDER_SECRET_3 }}
      PROVIDER_SECRET_4: ${{ secrets.MODEL_PROVIDER_SECRET_4 }}
      PROVIDER_SECRET_5: ${{ secrets.MODEL_PROVIDER_SECRET_5 }}
